              '<h2 class="orbit-group__work-title"></h2>' +
              '<p class="orbit-group__work-title-zh"></p>' +
              '<p class="orbit-group__line"></p>' +
              '<p class="orbit-group__hint">' +
              escapeHtml(
                touchMode
                  ? "Swipe sideways. Tap a near work to open the full image."
                  : "Drag sideways. Click a near work to open the full image."
              ) +
              "</p>" +
              '<p class="orbit-group__progress"></p>' +
              "</div>" +
              "</section>"
            );
          })
          .join("");

        const groupStates = Array.from(groupsRoot.querySelectorAll(".orbit-group")).map(function (section, groupIndex) {
          return createGroupState(section, groups[groupIndex], groupIndex);
        });

        const visibilityObserver = enableDeferredGroups
          ? new IntersectionObserver(
              function (entries) {
                entries.forEach(function (entry) {
                  const section = entry.target;
                  const state = groupStates.find(function (item) {
                    return item.section === section;
                  });

                  if (!state) {
                    return;
                  }

                  state.isVisible = entry.isIntersecting;

                  if (entry.isIntersecting) {
                    ensureGroupCards(state);
                    if (!state.lastFrame) {
                      state.lastFrame = performance.now();
                    }
                    renderGroup(state);
                  }
                });
              },
              { root: null, rootMargin: "320px 0px 320px 0px", threshold: 0.01 }
            )
          : null;

        groupStates.forEach(function (state, index) {
          if (!enableDeferredGroups || index < 2) {
            ensureGroupCards(state);
            state.isVisible = true;
          }

          if (visibilityObserver) {
            visibilityObserver.observe(state.section);
          } else {
            ensureGroupCards(state);
            state.isVisible = true;
          }
        });

        if (detailBackdrop) {
          detailBackdrop.addEventListener("click", function () {
            if (performance.now() < detailState.ignoreCloseUntil) {
              return;
            }
            closeDetail();
          });
        }

        if (detailShell) {
          detailShell.addEventListener("click", function () {
            if (performance.now() < detailState.ignoreCloseUntil) {
              return;
            }
            closeDetail();
          });
        }

        document.addEventListener("keydown", function (event) {
          if (event.key === "Escape") {
            closeDetail();
            return;
          }

          if (detailState.groupIndex === null || detailState.workIndex === null) {
            return;
          }

          const group = groups[detailState.groupIndex];
          if (!group) {
            return;
          }

          if (event.key === "ArrowRight") {
            openDetail(detailState.groupIndex, getWrappedIndex(detailState.workIndex + 1, group.works.length));
          }

          if (event.key === "ArrowLeft") {
            openDetail(detailState.groupIndex, getWrappedIndex(detailState.workIndex - 1, group.works.length));
          }
        });

        requestAnimationFrame(tick);

        function createGroupState(section, group, groupIndex) {
          const viewport = section.querySelector(".orbit-group__viewport");
          const track = section.querySelector(".orbit-group__track");
          const title = section.querySelector(".orbit-group__work-title");
          const titleZh = section.querySelector(".orbit-group__work-title-zh");
          const line = section.querySelector(".orbit-group__line");
          const progress = section.querySelector(".orbit-group__progress");

          const state = {
            section,
            group,
            groupIndex,
            viewport,
            track,
            title,
            titleZh,
            line,
            progress,
            cards: [],
            current: 0,
            target: 0,
            activeIndex: 0,
            pointerDown: false,
            dragMoved: false,
            startX: 0,
            startTarget: 0,
            lastPointerX: 0,
            lastPointerTime: 0,
            dragVelocity: 0,
            inertiaVelocity: 0,
            pressedCardIndex: null,
            autoResumeAt: 1800 + groupIndex * 300,
            autoDirection: groupIndex % 2 === 0 ? 1 : -1,
            suppressClickUntil: 0,
            lastFrame: 0,
            isRendered: false,
            isVisible: !enableDeferredGroups || groupIndex < 2,
          };

          updateGroupMeta(state, 0);

          viewport.addEventListener(
            "wheel",
            function (event) {
              if (detailState.groupIndex !== null) {
                return;
              }

              const horizontalIntent = Math.abs(event.deltaX) > Math.abs(event.deltaY);
              if (!horizontalIntent) {
                return;
              }

              event.preventDefault();
              pauseAuto(state);
              const delta = event.deltaX;
              state.target += delta / 680;
              state.inertiaVelocity += clamp(delta / 7200, -0.14, 0.14);
            },
            { passive: false }
          );

          viewport.addEventListener("pointerdown", function (event) {
            if (detailState.groupIndex !== null) {
              return;
            }

            const targetCard = event.target && event.target.closest ? event.target.closest(".orbit-card") : null;
            state.pointerDown = true;
            state.dragMoved = false;
            state.startX = event.clientX;
            state.startTarget = state.target;
            state.lastPointerX = event.clientX;
            state.lastPointerTime = event.timeStamp || performance.now();
            state.dragVelocity = 0;
            state.inertiaVelocity = 0;
            state.pressedCardIndex =
              targetCard && state.track.contains(targetCard)
                ? Number(targetCard.getAttribute("data-work-index") || "0")
                : null;
            pauseAuto(state);
            viewport.setPointerCapture(event.pointerId);
          });

          viewport.addEventListener("pointermove", function (event) {
            if (!state.pointerDown) {
              return;
            }

            const deltaX = event.clientX - state.startX;
            if (Math.abs(deltaX) > (touchMode ? 6 : 10)) {
              state.dragMoved = true;
              state.pressedCardIndex = null;
            }

            state.target = state.startTarget - deltaX / 175;

            const now = event.timeStamp || performance.now();
            const stepX = event.clientX - state.lastPointerX;
            const stepTime = Math.max(16, now - state.lastPointerTime);
            const deltaTarget = -stepX / 175;
            state.dragVelocity = clamp((deltaTarget * 16) / stepTime, -0.28, 0.28);
            state.lastPointerX = event.clientX;
            state.lastPointerTime = now;
          });

          function releasePointer(event) {
            if (!state.pointerDown) {
              return;
            }

            state.pointerDown = false;
            if (state.dragMoved) {
              state.suppressClickUntil = performance.now() + 120;
              state.inertiaVelocity = state.dragVelocity * (touchMode ? 2.4 : 2.1);
            } else {
              const pointerIndex =
                state.pressedCardIndex !== null
                  ? state.pressedCardIndex
                  : (() => {
                      const hit =
                        event && typeof event.clientX === "number" && typeof event.clientY === "number"
                          ? document.elementFromPoint(event.clientX, event.clientY)
                          : null;
                      const card = hit && hit.closest ? hit.closest(".orbit-card") : null;
                      return card && state.track.contains(card)
                        ? Number(card.getAttribute("data-work-index") || "0")
                        : null;
                    })();

              state.pressedCardIndex = null;

              if (pointerIndex !== null) {
                const index = pointerIndex;
                const distanceToFront = Math.abs(wrapDelta(index - state.current, state.group.works.length));
                state.suppressClickUntil = performance.now() + 320;

                if (distanceToFront < DIRECT_OPEN_DISTANCE) {
                  state.target = getNearestTarget(state, index);
                  openDetail(state.groupIndex, index);
                  return;
                }

                pauseAuto(state);
                state.target = snapTargetToIndex(state, index);
                return;
              }

              state.target = Math.round(state.target);
            }
          }

          viewport.addEventListener("pointerup", releasePointer);
          viewport.addEventListener("pointercancel", releasePointer);
          viewport.addEventListener("pointerleave", releasePointer);

          return state;
        }

        function ensureGroupCards(state) {
          if (state.isRendered) {
            return;
          }

          state.track.innerHTML = state.group.works
            .map(function (work, index) {
              return (
                '<button class="orbit-card" type="button" data-work-index="' +
                String(index) +
                '" data-work-id="' +
                escapeHtml(work.id) +
                '" aria-label="' +
                escapeHtml(work.titleZh || work.title) +
                '">' +
                '<span class="orbit-card__frame">' +
                '<img src="' +
                escapeHtml(work.previewImage || work.image) +
                '" alt="' +
                escapeHtml(work.alt) +
                '" style="object-position:' +
                cropPositions[(state.groupIndex * 3 + index) % cropPositions.length] +
                ';" loading="' +
                (state.groupIndex === 0 && index < 3 ? "eager" : "lazy") +
                '" fetchpriority="' +
                (state.groupIndex === 0 && index < 2 ? "high" : "low") +
                '" decoding="async">' +
                "</span>" +
                "</button>"
              );
            })
            .join("");

          state.cards = Array.from(state.track.querySelectorAll(".orbit-card"));
          state.cards.forEach(function (card) {
            card.addEventListener("click", function () {
              if (performance.now() < state.suppressClickUntil) {
                return;
              }

              const index = Number(card.getAttribute("data-work-index") || "0");
              const distanceToFront = Math.abs(wrapDelta(index - state.current, state.group.works.length));
              if (distanceToFront < DIRECT_OPEN_DISTANCE) {
                state.target = getNearestTarget(state, index);
                openDetail(state.groupIndex, index);
                return;
              }

              pauseAuto(state);
              state.target = snapTargetToIndex(state, index);
            });
          });
          state.isRendered = true;
        }

        function tick(timestamp) {
          groupStates.forEach(function (state) {
            tickGroup(state, timestamp);
          });

          requestAnimationFrame(tick);
        }

        function tickGroup(state, timestamp) {
          if (!state.isRendered || (!state.isVisible && !state.pointerDown && detailState.groupIndex !== state.groupIndex)) {
            state.lastFrame = timestamp;
            return;
          }

          if (!state.lastFrame) {
            state.lastFrame = timestamp;
          }

          const deltaTime = timestamp - state.lastFrame;
          state.lastFrame = timestamp;
          const detailOpen = detailState.groupIndex !== null;

          if (!state.pointerDown && !detailOpen && !reducedMotion && timestamp > state.autoResumeAt) {
            state.target += deltaTime * 0.000009 * state.autoDirection;
          }

          if (!state.pointerDown && !detailOpen && Math.abs(state.inertiaVelocity) > 0.0008) {
            const frameFactor = deltaTime / 16;
            state.target += state.inertiaVelocity * frameFactor;
            state.inertiaVelocity *= Math.pow(0.972, frameFactor);
          } else if (!state.pointerDown && Math.abs(state.inertiaVelocity) <= 0.0008) {
            state.inertiaVelocity = 0;
          }

          if (!state.pointerDown && !detailOpen) {
            const nearest = Math.round(state.target);
            const snapDelta = nearest - state.target;
            const snapStrength =
              Math.abs(snapDelta) < 0.96 ? 0.11 : Math.abs(snapDelta) < 1.8 ? 0.052 : 0.018;
            state.target += snapDelta * snapStrength;
          }

          const lerp = state.pointerDown ? 0.16 : 0.08;
          state.current += (state.target - state.current) * lerp;
          renderGroup(state);
        }

        function renderGroup(state) {
          const viewportRect = state.viewport.getBoundingClientRect();
          const radiusX = Math.min(viewportRect.width * 0.38, 360);
          const nextActive = getWrappedIndex(Math.round(state.current), state.group.works.length);

          if (nextActive !== state.activeIndex) {
            state.activeIndex = nextActive;
            updateGroupMeta(state, state.activeIndex);
          } else {
            updateGroupProgress(state, state.activeIndex);
          }

          state.cards.forEach(function (card, index) {
            const delta = wrapDelta(index - state.current, state.group.works.length);
            const absDelta = Math.abs(delta);
            const clamped = clamp(delta, -2.8, 2.8);
            const x = Math.sin(clamped * 0.74) * radiusX;
            const y = Math.pow(absDelta, 1.22) * 18;
            const z = -Math.pow(absDelta, 1.2) * 175;
            const scale = Math.max(0.58, 1 - Math.pow(absDelta, 1.02) * 0.16);
            const rotateY = -delta * 22;
            const opacity = absDelta > 4.4 ? 0 : Math.max(0.82, 1 - absDelta * 0.034);
            const brightness = Math.max(0.74, 1 - absDelta * 0.08);
            const saturate = Math.max(0.82, 1 - absDelta * 0.04);
            const blur = Math.max(0, absDelta - 1.2) * 0.6;

            card.style.transform =
              "translate(-50%, -50%) translate3d(" +
              x.toFixed(2) +
              "px, " +
              y.toFixed(2) +
              "px, " +
              z.toFixed(2) +
              "px) rotateY(" +
              rotateY.toFixed(2) +
              "deg) scale(" +
              scale.toFixed(3) +
              ")";
            card.style.opacity = opacity.toFixed(3);
            card.style.zIndex = String(1000 - Math.round(absDelta * 100));
            card.style.setProperty(
              "--orbit-filter",
              "blur(" +
                blur.toFixed(2) +
                "px) brightness(" +
                brightness.toFixed(3) +
                ") saturate(" +
                saturate.toFixed(3) +
                ")"
            );
            card.classList.toggle("is-active", index === state.activeIndex);
            card.classList.toggle("is-near", absDelta < 1.36);
            card.classList.toggle("is-openable", absDelta < OPENABLE_DISTANCE);
          });
        }

        function updateGroupMeta(state, index) {
          const work = state.group.works[index];
          if (!work) {
            return;
          }

          if (state.title) {
            state.title.textContent = work.titleZh || work.title;
            state.title.classList.toggle("zh-font", hasHan(state.title.textContent));
          }

          if (state.titleZh) {
            const secondary = work.title && work.title !== work.titleZh ? work.title : "";
            state.titleZh.textContent = secondary;
            state.titleZh.hidden = !secondary;
            state.titleZh.classList.toggle("zh-font", hasHan(secondary));
          }

          if (state.line) {
            state.line.textContent = [work.mediumZh || work.medium, work.size, work.year].filter(Boolean).join(" / ");
            state.line.classList.toggle("zh-font", hasHan(state.line.textContent));
          }

          updateGroupProgress(state, index);
        }

        function updateGroupProgress(state, index) {
          if (!state.progress) {
            return;
          }

          state.progress.textContent =
            String(index + 1).padStart(2, "0") +
            " / " +
            String(state.group.works.length).padStart(2, "0");
        }

        function openDetail(groupIndex, workIndex) {
          const group = groups[groupIndex];
          if (!group) {
            return;
          }

          const work = group.works[getWrappedIndex(workIndex, group.works.length)];
          if (!work || !detail || !detailImage || !detailTitle || !detailTitleZh || !detailLine) {
            return;
          }

          if (detailState.closeTimer) {
            clearTimeout(detailState.closeTimer);
            detailState.closeTimer = null;
          }

          detailState.groupIndex = groupIndex;
          detailState.workIndex = getWrappedIndex(workIndex, group.works.length);
          detailTitle.textContent = work.titleZh || work.title;
          detailTitle.classList.toggle("zh-font", hasHan(detailTitle.textContent));
          detailTitleZh.textContent = work.title && work.title !== work.titleZh ? work.title : "";
          detailTitleZh.hidden = !detailTitleZh.textContent;
          detailTitleZh.classList.toggle("zh-font", hasHan(detailTitleZh.textContent));
          detailLine.textContent = [work.mediumZh || work.medium, work.size, work.year].filter(Boolean).join(" / ");
          detailLine.classList.toggle("zh-font", hasHan(detailLine.textContent));
          detailState.ignoreCloseUntil = performance.now() + 360;
          detail.classList.remove("is-closing");
          detail.classList.add("is-open");
          detail.classList.add("is-loading");
          detail.setAttribute("aria-hidden", "false");
          document.body.classList.add("has-detail-open");

          const loadToken = ++detailState.loadToken;
          detailImage.classList.remove("is-ready");
          detailImage.alt = work.alt;
          detailImage.removeAttribute("src");

          const preloader = new Image();
          preloader.decoding = "async";
          preloader.src = work.image;

          function commitImage() {
            if (loadToken !== detailState.loadToken) {
              return;
            }

            detailImage.src = work.image;
            detailImage.alt = work.alt;
            requestAnimationFrame(function () {
              if (loadToken !== detailState.loadToken) {
                return;
              }
              detail.classList.remove("is-loading");
              detailImage.classList.add("is-ready");
            });
          }

          if (typeof preloader.decode === "function") {
            preloader.decode().then(commitImage).catch(commitImage);
          } else {
            preloader.onload = commitImage;
            preloader.onerror = commitImage;
          }
        }

        function closeDetail() {
          if (!detail || detailState.groupIndex === null) {
            return;
          }

          detailImage.classList.remove("is-ready");
          detail.classList.remove("is-open");
          detail.classList.remove("is-loading");
          detail.classList.add("is-closing");
          detailState.groupIndex = null;
          detailState.workIndex = null;
          detailState.ignoreCloseUntil = 0;
          detailState.loadToken += 1;
          document.body.classList.remove("has-detail-open");

          if (detailState.closeTimer) {
            clearTimeout(detailState.closeTimer);
          }

          detailState.closeTimer = setTimeout(function () {
            detail.classList.remove("is-closing");
            detail.setAttribute("aria-hidden", "true");
            detailImage.removeAttribute("src");
            detailState.closeTimer = null;
          }, 380);
        }

        function pauseAuto(state) {
          state.autoResumeAt = performance.now() + 5200;
        }

        function getWrappedIndex(index, length) {
          return ((index % length) + length) % length;
        }

        function getNearestTarget(state, index) {
          const candidates = [];
          for (let offset = -2; offset <= 2; offset += 1) {
            candidates.push(index + offset * state.group.works.length);
          }

          return candidates.reduce(function (best, candidate) {
            return Math.abs(candidate - state.current) < Math.abs(best - state.current) ? candidate : best;
          }, candidates[0]);
        }

        function snapTargetToIndex(state, index) {
          const nearest = getNearestTarget(state, index);
          return state.target + (nearest - state.target) * 0.82;
        }

        function wrapDelta(delta, length) {
          const half = length / 2;
          return ((((delta + half) % length) + length) % length) - half;
        }

        function clamp(value, min, max) {
          return Math.max(min, Math.min(max, value));
        }

        function hasHan(value) {
          return /[\u3400-\u9fff\uf900-\ufaff]/.test(String(value || ""));
        }

        function escapeHtml(value) {
          return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }
      })();
    </script>
    <script src="nav-transition.js?v=v154"></script>
  </body>
